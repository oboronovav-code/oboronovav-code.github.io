<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта моніторингу - Система IoT</title>
    <link rel="stylesheet" href="головна1.css">
</head>
<body>

    <header id="main-header">
        <div class="menu-icon">☰</div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html" class="btn-nav">Головна</a></li>
                <li><a href="#" class="btn-nav">Карта</a></li>
                <li><a href="авторизація.html" class="btn-nav">Увійти/Реєстрація</a></li>
            </ul>
        </nav>
    </header>

    <div class="map-page-wrapper">
        <aside class="map-sidebar">
            <div class="custom-dropdown" id="priority-dropdown">
                <div class="dropdown-header" onclick="toggleDropdown()">
                    <span>Пріоритетні точки</span>
                    <span class="arrow">▾</span>
                </div>
                <div class="dropdown-list" id="priority-list">
                    </div>
            </div>
        
            <button class="side-btn report-btn">Переглянути звіт</button>
        </aside>

        <main class="map-display">
            <div class="map-relative-container">
                <img src="карта.jpg" alt="Карта Києва">

                <div class="dot" id="bin-1" style="top: 92.6%; left: 21.8%;" title="Просп.Академіка Корольова"></div>
                <div class="dot" id="bin-2" style="top: 85.4%; left: 21.7%;" title="Михайлівська Боршагівка"></div>
                <div class="dot" id="bin-3" style="top: 80.8%; left: 21.6%;" title="Вул. Вахтанга Кікабідзе"></div>
                <div class="dot" id="bin-4" style="top: 76.3%; left: 21.4%;" title="Вул. Олександра Махова"></div>
                <div class="dot" id="bin-5" style="top: 71.7%; left: 21.2%;" title="Вул. Зодчих"></div>
                <div class="dot" id="bin-6" style="top: 67%; left: 21%;" title="Бульвар Миколи Руденка"></div>
                <div class="dot" id="bin-7" style="top: 61.4%; left: 20.82%;" title="Вул. Василя Доманицького"></div>
                <div class="dot" id="bin-8" style="top: 54.9%; left: 22.56%;" title="Гната Юри"></div>
                <div class="dot" id="bin-9" style="top: 49.9%; left: 29%;" title="Івана Дзюби"></div>
                <div class="dot" id="bin-10" style="top: 43.57%; left: 36.07%;" title="Вацлава Гавела"></div>
                <div class="dot" id="bin-11" style="top: 37.8%; left: 42.9%;" title="Академіка Шалімова"></div>
                <div class="dot" id="bin-12" style="top: 33.4%; left: 48%;" title="Національний Авіаційний Університет"></div>
                <div class="dot" id="bin-13" style="top: 29%; left: 53%;" title="Індустріальна"></div>
                <div class="dot" id="bin-14" style="top: 24.9%; left: 57.8%;" title="Олекси Тихого"></div>
                <div class="dot" id="bin-15" style="top: 20.13%; left: 63.79%;" title="Політехнічна"></div>
                <div class="dot" id="bin-16" style="top: 9.48%; left: 75.5%;" title="Галицька площа"></div>
                <div class="dot" id="bin-17" style="top: 8.38%; left: 81.2%;" title="Старовокзальна"></div>
                <div class="dot" id="bin-18" style="top: 61.2%; left: 15.6%;" title="Жуля Верна"></div>

                <div id="info-popup" class="info-popup">
                    <div class="popup-content">
                        <span class="close-popup" onclick="closePopup()">&times;</span>
                        <h3 id="popup-title">Назва станції</h3>
                        <p id="popup-status">Статус: завантаження...</p>
                        <p id="popup-fill">Заповненість: 0%</p>
                        <button class="side-btn" style="width: 100%; margin-top: 10px;">Детальніше</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Дані про станції (імітація бази даних)
        const trashBinsData = [
            { id: 'bin-1', fillLevel: 10 }, 
            { id: 'bin-2', fillLevel: 85 }, 
            { id: 'bin-3', fillLevel: 50 },
            { id: 'bin-4', fillLevel: 0 }, 
            { id: 'bin-5', fillLevel: 15 }, 
            { id: 'bin-6', fillLevel: 90 },
            { id: 'bin-7', fillLevel: 63 }, 
            { id: 'bin-8', fillLevel: 74 }, 
            { id: 'bin-9', fillLevel: 5 },
            { id: 'bin-10', fillLevel: 50 }, 
            { id: 'bin-11', fillLevel: 'none' }, 
            { id: 'bin-12', fillLevel: 2 },
            { id: 'bin-13', fillLevel: 55 }, 
            { id: 'bin-14', fillLevel: 60 }, 
            { id: 'bin-15', fillLevel: 10 },
            { id: 'bin-16', fillLevel: 20 }, 
            { id: 'bin-17', fillLevel: 50 }, 
            { id: 'bin-18', fillLevel: 68 }
        ];
        
        function toggleDropdown() {
            document.getElementById('priority-dropdown').classList.toggle('active');
        }
        
        function refreshMap() {
            const listContainer = document.getElementById('priority-list');
            listContainer.innerHTML = ''; // Очищуємо список
            let hasPriority = false;
        
            trashBinsData.forEach(bin => {
                const element = document.getElementById(bin.id);
                if (element) {
                    let statusClass = 'status-empty';
                    const titleText = element.getAttribute('title');
                    let icon = '';
        
                    if (bin.fillLevel === 'none') {
                        statusClass = 'status-problem';
                        icon = '⚪';
                        addListItem(bin.id, icon, titleText);
                        hasPriority = true;
                    } 
                    else if (bin.fillLevel > 80) {
                        statusClass = 'status-full';
                        icon = '🔴';
                        addListItem(bin.id, icon, titleText);
                        hasPriority = true;
                    } 
                    else if (bin.fillLevel > 40) {
                        statusClass = 'status-medium';
                    }
        
                    element.className = 'dot ' + statusClass;
                    element.onclick = (event) => showPopup(event, bin.id);
                }
            });

        }
        
        // Функція створення елемента списку
        function addListItem(id, icon, text) {
            const container = document.getElementById('priority-list');
            const item = document.createElement('div');
            item.className = 'dropdown-item';
            item.innerHTML = `<span>${icon}</span> <span>${text}</span>`;
            
            // При кліку на пункт — фокусуємо карту
            item.onclick = () => {
                const dot = document.getElementById(id);
                if (dot) {
                    dot.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // Можна додати закриття списку після вибору:
                    // toggleDropdown(); 
                }
            };
            
            container.appendChild(item);
        }
        function showPopup(event, binId) {
            const popup = document.getElementById('info-popup');
            const binData = trashBinsData.find(b => b.id === binId);
            const element = document.getElementById(binId);
            const title = element.getAttribute('title');
        
            if (!binData) return;
        
            // Заповнюємо дані
            document.getElementById('popup-title').innerText = title;
            document.getElementById('popup-fill').innerText = `Заповненість: ${binData.fillLevel === 'none' ? '—' : binData.fillLevel + '%'}`;
            
            let statusText = "Норма";
            if (binData.fillLevel === 'none') statusText = "Помилка датчика";
            else if (binData.fillLevel > 80) statusText = "Критично (Повний)";
            else if (binData.fillLevel > 40) statusText = "Середній рівень";
            
            document.getElementById('popup-status').innerText = `Статус: ${statusText}`;
        
            // Позиціонуємо вікно поруч із курсором або точкою
            popup.style.display = 'block';
            popup.style.left = (event.pageX - 100) + 'px'; // Центруємо відносно кліку
            popup.style.top = (event.pageY - 160) + 'px'; // Трохи вище точки
        }
        
        function closePopup() {
            document.getElementById('info-popup').style.display = 'none';
        }
        
        window.onload = refreshMap;
    </script>

</body>
</html>
