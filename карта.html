<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта моніторингу - Система IoT</title>
    <link rel="stylesheet" href="CSS/головна1.css">
</head>
<body>

    <header id="main-header">
        <div class="menu-icon">☰</div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html" class="btn-nav">Головна</a></li>
                <li><a href="#" class="btn-nav">Карта</a></li>
                <li><a href="авторизація.html" class="btn-nav">Увійти/Реєстрація</a></li>
            </ul>
        </nav>
    </header>

    <div class="map-page-wrapper">
        <aside class="map-sidebar">
            <button class="side-btn">Список пріоритетних точок</button>
            <button class="side-btn">Переглянути звіт</button>
        </aside>

        <main class="map-display">
            <div class="map-relative-container">
                <img src="зображення/карта.jpg" alt="Карта Києва">

                <div class="dot" id="bin-1" style="top: 92.6%; left: 21.8%;" title="Просп.Академіка Корольова"></div>
                <div class="dot" id="bin-2" style="top: 85.4%; left: 21.7%;" title="Михайлівська Боршагівка"></div>
                <div class="dot" id="bin-3" style="top: 80.8%; left: 21.6%;" title="Вул. Вахтанга Кікабідзе"></div>
                <div class="dot" id="bin-4" style="top: 76.3%; left: 21.4%;" title="Вул. Олександра Махова"></div>
                <div class="dot" id="bin-5" style="top: 71.7%; left: 21.2%;" title="Вул. Зодчих"></div>
                <div class="dot" id="bin-6" style="top: 67%; left: 21%;" title="Бульвар Миколи Руденка"></div>
                <div class="dot" id="bin-7" style="top: 61.4%; left: 20.82%;" title="Вул. Василя Доманицького"></div>
                <div class="dot" id="bin-8" style="top: 54.9%; left: 22.56%;" title="Гната Юри"></div>
                <div class="dot" id="bin-9" style="top: 49.9%; left: 29%;" title="Івана Дзюби"></div>
                <div class="dot" id="bin-10" style="top: 43.57%; left: 36.07%;" title="Вацлава Гавела"></div>
                <div class="dot" id="bin-11" style="top: 37.8%; left: 42.9%;" title="Академіка Шалімова"></div>
                <div class="dot" id="bin-12" style="top: 33.4%; left: 48%;" title="Національний Авіаційний Університет"></div>
                <div class="dot" id="bin-13" style="top: 29%; left: 53%;" title="Індустріальна"></div>
                <div class="dot" id="bin-14" style="top: 24.9%; left: 57.8%;" title="Олекси Тихого"></div>
                <div class="dot" id="bin-15" style="top: 20.13%; left: 63.79%;" title="Політехнічна"></div>
                <div class="dot" id="bin-16" style="top: 9.48%; left: 75.5%;" title="Галицька площа"></div>
                <div class="dot" id="bin-17" style="top: 8.38%; left: 81.2%;" title="Старовокзальна"></div>
                <div class="dot" id="bin-18" style="top: 61.2%; left: 15.6%;" title="Жуля Верна"></div>
            </div>
        </main>
    </div>

    <script>
        // Імітація даних з БД (наприклад, рівень заповненості у %)
        const trashBinsData = [
            { id: 'bin-1', fillLevel: 10 }, // Мало -> зелений
            { id: 'bin-2', fillLevel: 85 }, // Багато -> червоний
            { id: 'bin-3', fillLevel: 50 },
            { id: 'bin-4', fillLevel: 0 }, // Мало -> зелений
            { id: 'bin-5', fillLevel: 15 }, // Багато -> червоний
            { id: 'bin-6', fillLevel: 90 },
            { id: 'bin-7', fillLevel: 63 }, // Мало -> зелений
            { id: 'bin-8', fillLevel: 74 }, // Багато -> червоний
            { id: 'bin-9', fillLevel: 5 },
            { id: 'bin-10', fillLevel: 50 }, // Мало -> зелений
            { id: 'bin-11', fillLevel: 'none' }, // Багато -> червоний
            { id: 'bin-12', fillLevel: 2 },
            { id: 'bin-13', fillLevel: 55 }, // Мало -> зелений
            { id: 'bin-14', fillLevel: 60 }, // Багато -> червоний
            { id: 'bin-15', fillLevel: 10 },
            { id: 'bin-16', fillLevel: 20 }, // Мало -> зелений
            { id: 'bin-17', fillLevel: 50 }, // Багато -> червоний
            { id: 'bin-18', fillLevel: 68 }  // Середньо -> жовтий
        ];

        function refreshMap() {
            trashBinsData.forEach(bin => {
                const element = document.getElementById(bin.id);
                if (element) {
                    // Визначаємо клас кольору залежно від рівня
                    let statusClass = 'status-empty';
                    if (bin.fillLevel === 'none') {
                        statusClass = 'status-problem';
                        titleText = 'Помилка датчика';
                    } 
                    else if (bin.fillLevel > 80) {
                        statusClass = 'status-full';
                    } 
                    else if (bin.fillLevel > 40) {
                        statusClass = 'status-medium';
                    }

                    // Оновлюємо елемент
                    element.className = 'dot ' + statusClass;
                    element.title = `Заповненість: ${bin.fillLevel}%`;
                }
            });
        }

        // Запускаємо при завантаженні
        window.onload = refreshMap;
    </script>

</body>
</html>
