<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - Система моніторингу</title>
    <link rel="stylesheet" href="головна1.css">
</head>
<body>

    <header id="main-header">
        <div class="menu-icon">☰</div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html" class="btn-nav">Головна</a></li>
                <li><a href="карта.html" class="btn-nav">Карта</a></li>
                <li><a href="#" class="btn-nav">Увійти/Реєстрація</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Авторизація</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Логін</label>
                    <input type="text" id="username" placeholder="Введіть логін" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="password" placeholder="Введіть пароль" required>
                    <div class="forgot-password">
                        <a href="#">Забули пароль?</a>
                    </div>
                </div>
                <button type="button" class="btn-submit" onclick="handleLogin()">Увійти</button>
            </form>
            
            <div class="auth-divider">або</div>
            <a href="авторизація.html" class="btn-alt">Реєстрація</a>
        </div>
    </main>
    <script src="js-авторизація.js"></script>
</body>
</html>
